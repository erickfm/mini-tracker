<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>Mini Tracker — RunPod Spend</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <nav class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="/" class="text-lg font-semibold text-gray-800 tracking-tight">Mini Tracker</a>
            <span class="text-xs text-gray-400">RunPod Spend Dashboard</span>
        </div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto w-full px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-200 px-6 py-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between text-xs text-gray-400">
            <span>Estimated costs, prorated to current date</span>
            <span>Auto-refreshes every 5 minutes</span>
        </div>
    </footer>
</body>
</html>
