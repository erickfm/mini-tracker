{% extends "base.html" %}

{% block content %}
<div class="mt-24 max-w-xs mx-auto">
    <div class="flex justify-center mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-9 h-9">
            <rect width="32" height="32" rx="8" fill="#486a8c"/>
            <polyline points="7,21 13,14 18,17 25,9" fill="none" stroke="#f0ebe3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <p class="text-[11px] text-clay-500 text-center mb-6 lowercase tracking-widest">tracker</p>
    <form method="POST" class="bg-clay-850 rounded-xl border border-clay-800 p-5">
        {% if error %}
        <p class="text-red-400/70 text-xs mb-3">{{ error }}</p>
        {% endif %}
        <input
            type="password"
            name="password"
            id="password"
            autofocus
            required
            class="block w-full rounded-lg border border-clay-700 bg-clay-900 text-clay-100 px-3 py-2 text-xs focus:border-ceramic-500 focus:ring-1 focus:ring-ceramic-500 focus:outline-none mb-3 placeholder-clay-600"
            placeholder="password"
        >
        <button
            type="submit"
            class="w-full rounded-lg bg-ceramic-500 px-4 py-2 text-xs font-medium text-clay-50 hover:bg-ceramic-400 focus:outline-none focus:ring-2 focus:ring-ceramic-500 focus:ring-offset-2 focus:ring-offset-clay-900 transition-colors"
        >
            sign in
        </button>
    </form>
</div>
{% endblock %}
