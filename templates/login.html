{% extends "base.html" %}

{% block content %}
<div class="mt-16 max-w-sm mx-auto">
    <h1 class="text-xl font-bold text-gray-900 text-center mb-6">Sign in to Mini Tracker</h1>
    <form method="POST" class="bg-white rounded-lg border border-gray-200 p-6">
        {% if error %}
        <p class="text-red-600 text-sm mb-4">{{ error }}</p>
        {% endif %}
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
            type="password"
            name="password"
            id="password"
            autofocus
            required
            class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500 mb-4"
        >
        <button
            type="submit"
            class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
        >
            Sign in
        </button>
    </form>
</div>
{% endblock %}
