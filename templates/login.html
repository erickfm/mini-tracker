{% extends "base.html" %}

{% block content %}
<div class="mt-16 max-w-sm mx-auto">
    <div class="flex justify-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-12 h-12">
            <rect width="32" height="32" rx="8" fill="#6366f1"/>
            <polyline points="6,22 12,14 18,18 26,8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="26" cy="8" r="2.5" fill="#34d399"/>
        </svg>
    </div>
    <h1 class="text-xl font-bold text-gray-100 text-center mb-6">Sign in to Tracker</h1>
    <form method="POST" class="bg-gray-900 rounded-lg border border-gray-800 p-6">
        {% if error %}
        <p class="text-red-400 text-sm mb-4">{{ error }}</p>
        {% endif %}
        <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Password</label>
        <input
            type="password"
            name="password"
            id="password"
            autofocus
            required
            class="block w-full rounded-md border border-gray-700 bg-gray-800 text-gray-200 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500 mb-4 placeholder-gray-600"
            placeholder="Enter password"
        >
        <button
            type="submit"
            class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-colors"
        >
            Sign in
        </button>
    </form>
</div>
{% endblock %}
