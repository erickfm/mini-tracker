{% extends "base.html" %}

{% block content %}
<div class="mt-24 max-w-xs mx-auto">
    <div class="flex justify-center mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-9 h-9">
            <rect width="32" height="32" rx="8" fill="#a8967a"/>
            <polyline points="7,21 13,14 18,17 25,9" fill="none" stroke="#f5f0e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <p class="text-[11px] text-stone-600 text-center mb-6 lowercase tracking-widest">tracker</p>
    <form method="POST" class="bg-stone-900/80 rounded-xl border border-stone-800/60 p-5">
        {% if error %}
        <p class="text-red-400/70 text-xs mb-3">{{ error }}</p>
        {% endif %}
        <input
            type="password"
            name="password"
            id="password"
            autofocus
            required
            class="block w-full rounded-lg border border-stone-800 bg-stone-950 text-stone-300 px-3 py-2 text-xs focus:border-stone-600 focus:ring-1 focus:ring-stone-600 focus:outline-none mb-3 placeholder-stone-700"
            placeholder="password"
        >
        <button
            type="submit"
            class="w-full rounded-lg bg-stone-700 px-4 py-2 text-xs font-medium text-stone-200 hover:bg-stone-600 focus:outline-none focus:ring-2 focus:ring-stone-500 focus:ring-offset-2 focus:ring-offset-stone-925 transition-colors"
        >
            sign in
        </button>
    </form>
</div>
{% endblock %}
