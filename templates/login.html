{% extends "base.html" %}

{% block content %}
<div class="mt-24 max-w-xs mx-auto">
    <div class="flex justify-center mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-10 h-10">
            <rect width="32" height="32" rx="8" fill="#6366f1"/>
            <polyline points="6,22 12,14 18,18 26,8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="26" cy="8" r="2.5" fill="#34d399"/>
        </svg>
    </div>
    <p class="text-xs text-gray-600 text-center mb-6 lowercase tracking-widest">tracker</p>
    <form method="POST" class="glass rounded-xl border border-white/5 p-5">
        {% if error %}
        <p class="text-red-400/80 text-xs mb-3">{{ error }}</p>
        {% endif %}
        <input
            type="password"
            name="password"
            id="password"
            autofocus
            required
            class="block w-full rounded-lg border border-white/10 bg-white/5 text-gray-200 px-3 py-2 text-xs focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none mb-3 placeholder-gray-700"
            placeholder="password"
        >
        <button
            type="submit"
            class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-xs font-medium text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-[#0a0a0f] transition-colors"
        >
            sign in
        </button>
    </form>
</div>
{% endblock %}
