{% extends "base.html" %}

{% block content %}
<div class="mt-12 max-w-lg mx-auto">
    <div class="bg-red-950/50 border border-red-800/50 rounded-lg p-6">
        <h2 class="text-red-400 font-semibold text-lg mb-2">Something went wrong</h2>
        <p class="text-red-300/80 text-sm">{{ message }}</p>
    </div>
    <p class="text-gray-600 text-sm mt-4 text-center">
        Check that <code class="bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded text-xs">RUNPOD_API_KEY</code> is set correctly and try again.
    </p>
</div>
{% endblock %}
